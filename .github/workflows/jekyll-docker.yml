<script>
  // Scroll to top button
  window.addEventListener('scroll', function() {
    document.getElementById('scrollTop').style.display = window.scrollY > 300 ? 'block' : 'none';
  });

  // Fade in on scroll
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(function(el) { observer.observe(el); });

  // ===== CUSTOMER FEEDBACK CAROUSEL =====
  var feedbackIndex = 0;
  var feedbackTotal = document.querySelectorAll('#feedbackStack .carousel-slide').length;
  var feedbackQuotes = [
    '⭐ "Super crunchy and affordable!"',
    '⭐ "Love the matcha glaze topping"',
    '⭐ "Will definitely preorder again"',
    '⭐ "Generous topping!"',
    '⭐ "Delicious!"'
  ];

  function renderFeedbackCarousel() {
    var slides = document.querySelectorAll('#feedbackStack .carousel-slide');
    slides.forEach(function(slide, i) {
      slide.classList.remove('active', 'behind-1', 'behind-2');
      var diff = (i - feedbackIndex + feedbackTotal) % feedbackTotal;
      if (diff === 0) slide.classList.add('active');
      else if (diff === 1) slide.classList.add('behind-1');
      else if (diff === 2) slide.classList.add('behind-2');
    });
    var dots = document.querySelectorAll('#feedbackDots .carousel-dot');
    dots.forEach(function(dot, i) { dot.classList.toggle('active', i === feedbackIndex); });
    var caption = document.getElementById('feedbackCaption');
    if (caption) caption.textContent = feedbackQuotes[feedbackIndex] || '';
  }

  function changeFeedbackSlide(direction) {
    feedbackIndex = (feedbackIndex + direction + feedbackTotal) % feedbackTotal;
    renderFeedbackCarousel();
  }

  function goToFeedbackSlide(i) {
    feedbackIndex = i;
    renderFeedbackCarousel();
  }

  renderFeedbackCarousel();

  // ===== REFLECTION DATA =====
  var reflections = [
    {
      id: 'sharul',
      name: 'Md Sharul Hafiz Bin Kanan',
      role: 'Manager',
      image: 'sharul pic.png',
      emoji: '👨',
      essay: 'Leading Popislicious as Manager has been one of the most meaningful experiences of my academic journey. From the very first planning session to the final day of our booth at Gazebo FPPS, I witnessed firsthand what it truly means to run a business — not just managing numbers, but managing people, emotions, and unexpected challenges.\n\nAs Manager, my biggest lesson was that communication is everything. Coordinating eight team members, each with their own schedules and responsibilities, taught me the importance of clarity, patience, and consistency. There were days when orders piled up and stress ran high, but seeing our team pull together gave me confidence that we built something real.\n\nThe moment we hit 300 followers on Instagram and watched RM 1,350.50 in sales accumulate was genuinely surreal. We started as students trying to fulfill an assignment, and somewhere along the way we became entrepreneurs. I am incredibly proud of every person in this team and grateful for every customer who trusted our popia.'
    },
    {
      id: 'amansyah',
      name: 'Muhammad Amansyah Bin Basok',
      role: 'Operational Manager',
      emoji: '👨',
      image: 'aman pic.jpeg',
      essay: 'As the Operational Manager of Popislicious, I was responsible for making sure every batch of popia was prepared on time, every order was fulfilled correctly, and every delivery ran smoothly. It sounds straightforward — but the reality was a beautiful, chaotic adventure I will never forget.\n\nOne of the biggest challenges I faced was managing preorder volumes. On several days, demand far exceeded what we had prepared, and I had to quickly reorganize our workflow to prioritize urgent orders without compromising quality. This taught me the value of systems — simple checklists, preparation rosters, and clear communication channels saved us many times.\n\nOperationally, I learned that a business lives and dies by its processes. When things went wrong, it was almost always because a process broke down. When things went right, it was because we had a clear plan and stuck to it.'
    },
    {
            id: 'jessica',
      name: 'Jessica Olga Musilim',
      role: 'Treasurer',
      emoji: '👩',
      image: 'jess pic.jpeg',
      essay: '	In the business practicum project, I was appointed as the Finance Manager. My main responsibility was to manage financial records, monitor cash flow, record sales transactions, and ensure all financial data were properly documented throughout the project.I successfully managed and recorded all financial transactions for the business. I ensured that daily sales were accurately recorded, including revenue and order details. I also monitored expenses to ensure the business operated within the allocated budget. Through careful financial tracking, I was able to provide clear financial summaries that helped the team understand the business performance and make better decisions.\n\nThis role helped me develop strong financial management skills, especially in handling sales records and expense tracking. My attention to detail improved, since accuracy in data entry was crucial to avoid errors in financial reporting. In addition, my analytical skills improved as I learned to interpret sales data and identify trends in revenue and spending.\n\nFrom this experience, I gained practical knowledge of financial operations in a small business environment. I learned how to manage cash flow, prepare basic financial records, and use digital platforms such as the eUsahawan Portal for sales reporting. This experience is one that I know will be most useful, even going as far as beyond the classroom.'
    },
    {
      id: 'darrel',
      name: 'Darrel Daniel',
      role: 'Treasurer',
      emoji: '👨',
      image: 'darrel pic.jpeg',
      essay: 'I was appointed as the group’s second treasurer, and my job was to assist the main treasurer in financial tracking for our business practicum. Although the main treasurer organized most transactions to prevent disruptions, I still reviewed records for errors or miscalculations and found none. Being the backup required me to understand every entry and remain prepared to step in if needed.    \n\nThe role taught me practical financial skills, which are categorizing expenses, reconciling petty cash, and preparing clear summaries for meetings. I learned the value of attention to detail, small transcription mistakes can distort a budget, and the usefulness of concise tables and notes to keep teammates informed and decisions efficient. Seeing contingency funds and short-term cashflow planning in action also gave me insight into realistic budgeting strategies.\n\nBeyond technical skills, the experience strengthened my communication and ethical sense. I learned to ask precise questions about ambiguous receipts and explain discrepancies without assigning blame, which helped maintain group trust. The practicum sparked a lasting interest in financial literacy and business, as well as gave me the confidence to take on greater responsibilities in future projects.'

    },
    {
      id: 'alice',
      name: 'Alice Alesandra Binti John Lee',
      role: 'Marketing',
      emoji: '👩',
      image: 'alice pic.jpeg',
      essay: '	In the APK practicum project, I was in charge of Marketing. My main responsibility was to promote and ensure that the target audience was aware of the event or product we were offering. I was required to be creative in designing promotional materials and strategic in selecting the most effective platforms to reach potential participants. Our product was promoted through platforms such as Facebook, Instagram, and TikTok. Through active and consistent product promotion, I successfully managed to achieve a total of more than 300 followers on each platforms.\n\nThis role helped me learn the importance of clear communication and careful planning in achieving marketing objectives. This is because I had to think creatively and collaborate closely with my team to develop engaging content and promotional strategies. I also learned how to manage my time effectively, as marketing tasks often required meeting deadlines and responding quickly to feedback or changes. As a result, it helped me improve my problem-solving and teamwork skills.\n\nOverall, being responsible for marketing enhanced my confidence and professional skills. I gained valuable knowledge about audience engagement, digital promotion, and the importance of adaptability in marketing campaigns. The experience taught me that successful marketing is not only about promoting something but also about understanding the needs and interests of the audience. I believe the skills and lessons I gained from this role will be beneficial in my future academic and professional endeavors.'
    },
    {
      id: 'celine',
      name: 'Celine Henric',
      role: 'Media',
      emoji: '👩',
      image: 'celine pic.jpeg',
      essay: 'Being in charge of media for Popislicious meant I was the one capturing our story — through photos, videos, and the visual identity of everything we posted online. It was a role I embraced with everything I had.\n\nI learned that good content starts before the camera. Planning shots, thinking about lighting, choosing the right angles to make our popia look as delicious as it tasted — all of this took time and creativity. I also had to balance quality with speed, because social media rewards consistency.\n\nOne thing I am especially proud of is how our feed came together visually. The warm yellows and greens of our brand aesthetic felt cohesive, inviting, and recognizably us. This experience has deepened my passion for visual storytelling and content creation.'
    },
    {
      id: 'shahri',
      name: 'Shahri Afnan Bin Saimon',
      role: 'Sales Manager',
      emoji: '👨',
      image: 'afnan pic.jpeg',
      essay: 'in the practicum, I was appointed as the Sales Manager. My main responsibility was to develop and implement sales strategies to increase product sales and achieve business targets. I monitored sales performance, identified potential market opportunities, and coordinated promotional activities to attract customers. I also worked closely with team members to ensure that sales objectives were met and that customer needs were effectively addressed. By tracking sales data and customer trends, I was able to provide valuable insights that supported business decisions and improved overall performance.\n\nThis role helped me develop strong sales and leadership skills. I improved my communication and persuasion abilities through interactions with customers and promotional efforts. I also enhanced my analytical skills by evaluating sales performance and identifying strategies to increase revenue. Additionally, I learned how to motivate team members and work collaboratively to achieve common business goals.\n\nFrom this experience, I gained practical knowledge of sales management in a business environment. I learned how to create effective sales strategies, analyze customer behavior, and use marketing techniques to drive sales growth. This experience strengthened my understanding of the relationship between sales performance, customer satisfaction, and business success.'
    },
    {
      id: 'shahrul',
      name: 'Muhammad Shahrul Ramadhan Bin Manap',
      role: 'Customer Service',
      emoji: '👨',
      image: 'shahrul pic.jpeg',
      essay: 'In the business practicum project, I was appointed as the Sales Manager. My main responsibility was to develop and implement sales strategies to increase product sales and achieve business targets. I monitored sales performance, identified potential market opportunities, and coordinated promotional activities to attract customers. I also worked closely with team members to ensure that sales objectives were met and that customer needs were effectively addressed. By tracking sales data and customer trends, I was able to provide valuable insights that supported business decisions and improved overall performance.\n\n This role helped me develop strong sales and leadership skills. I improved my communication and persuasion abilities through interactions with customers and promotional efforts. I also enhanced my analytical skills by evaluating sales performance and identifying strategies to increase revenue. Additionally, I learned how to motivate team members and work collaboratively to achieve common business goals. \n\nFrom this experience, I gained practical knowledge of sales management in a business environment. I learned how to create effective sales strategies, analyze customer behavior, and use marketing techniques to drive sales growth. This experience strengthened my understanding of the relationship between sales performance, customer satisfaction, and business success.ether the customer came back. I learned to stay calm, apologize sincerely, and offer solutions rather than excuses. I am also proud of the positive feedback we received. Reading messages from customers who said our popia was worth every ringgit reminded me why great customer service matters. I leave this practicum with a commitment to always putting customers first.'
    }
  ];

  // Build reflection cards dynamically
  var grid = document.getElementById('reflectionGrid');
  reflections.forEach(function(member) {
    var card = document.createElement('div');
    card.className = 'reflection-card';
    var avatarInner = member.image
      ? '<img src="' + member.image + '" alt="' + member.name + '" style="width:100%;height:100%;object-fit:cover;">'
      : '<div class="ref-avatar-fallback">' + member.emoji + '</div>';
    card.innerHTML =
      '<div class="ref-avatar-wrap">' + avatarInner + '</div>' +
      '<div class="ref-name">' + member.name + '</div>' +
      '<div class="ref-role-pill">' + member.role + '</div>' +
      '<div class="ref-hint">Tap to read reflection →</div>';
    card.addEventListener('click', function() { openReflection(member.id); });
    grid.appendChild(card);
  });

  // Close modal when clicking the dark overlay
  document.getElementById('reflectionModal').addEventListener('click', function(e) {
    if (e.target === this) closeReflection();
  });

  function openReflection(id) {
    var member = null;
    for (var i = 0; i < reflections.length; i++) {
      if (reflections[i].id === id) { member = reflections[i]; break; }
    }
    if (!member) return;

    document.getElementById('modalName').textContent = member.name;
    document.getElementById('modalRole').textContent = member.role;
    var avatarWrap = document.getElementById('reflectionModal').querySelector('.ref-modal-avatar-wrap');
    if (member.image) {
      avatarWrap.innerHTML = '<img src="' + member.image + '" alt="' + member.name + '" style="width:100%;height:100%;object-fit:cover;">';
    } else {
      avatarWrap.innerHTML = '<div id="modalPhotoFallback" class="ref-avatar-fallback big-fallback">' + member.emoji + '</div>';
    }

    var paragraphs = member.essay.split('\n\n');
    var html = '';
    for (var j = 0; j < paragraphs.length; j++) {
      html += '<p style="margin-bottom:12px;">' + paragraphs[j] + '</p>';
    }
    document.getElementById('modalEssay').innerHTML = html;

    document.getElementById('reflectionModal').classList.add('open');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
  }

  function closeReflection() {
    document.getElementById('reflectionModal').classList.remove('open');
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeReflection();
  });
</script>

<!-- ===== POPISLICIOUS ANIMATION LAYER ===== -->
<style>
/* --- Scroll-reveal base --- */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
}
.reveal.reveal-left  { transform: translateX(-50px); }
.reveal.reveal-right { transform: translateX(50px); }
.reveal.reveal-scale { transform: scale(0.85); }
.reveal.visible {
  opacity: 1 !important;
  transform: none !important;
}

/* Stagger children inside .stagger-children */
.stagger-children > * {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.stagger-children.visible > *:nth-child(1)  { transition-delay: 0.05s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(2)  { transition-delay: 0.12s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(3)  { transition-delay: 0.19s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(4)  { transition-delay: 0.26s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(5)  { transition-delay: 0.33s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(6)  { transition-delay: 0.40s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(7)  { transition-delay: 0.47s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(8)  { transition-delay: 0.54s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(9)  { transition-delay: 0.61s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(10) { transition-delay: 0.68s; opacity:1; transform:none; }
.stagger-children.visible > *:nth-child(n+11) { transition-delay: 0.75s; opacity:1; transform:none; }

/* --- Animated counter numbers --- */
.anim-counter { display: inline-block; }

/* --- Pulse ring on hero logo --- */
@keyframes pulseRing {
  0%   { box-shadow: 0 0 0 0 rgba(244,132,95,0.5), 0 0 0 5px rgba(255,209,102,0.4); }
  70%  { box-shadow: 0 0 0 16px rgba(244,132,95,0), 0 0 0 20px rgba(255,209,102,0); }
  100% { box-shadow: 0 0 0 0 rgba(244,132,95,0), 0 0 0 0 rgba(255,209,102,0); }
}
.hero-logo-ring { animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both, pulseRing 2.4s 0.8s ease-out infinite; }

/* --- Hero title letter-by-letter entrance --- */
.hero-title-anim { display: inline-block; }
.hero-title-char {
  display: inline-block;
  opacity: 0;
  transform: translateY(60px) rotate(8deg);
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.hero-title-char.popped { opacity: 1; transform: none; }

/* --- Hero badge bounce-in --- */
@keyframes badgeBounce {
  0%   { opacity:0; transform: scale(0.4) rotate(-8deg); }
  60%  { transform: scale(1.12) rotate(2deg); }
  100% { opacity:1; transform: scale(1) rotate(0deg); }
}
.hero-badge { animation: badgeBounce 0.55s 0.1s cubic-bezier(0.34,1.56,0.64,1) both; }

/* --- Tagline fade-up --- */
@keyframes taglineFade {
  from { opacity:0; transform: translateY(20px); }
  to   { opacity:1; transform: none; }
}
.hero-tagline { animation: taglineFade 0.7s 1s ease both; }

/* --- Hero card stat pop --- */
@keyframes statPop {
  from { opacity:0; transform: scale(0.7); }
  to   { opacity:1; transform: scale(1); }
}
.hero-stat { animation: statPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
.hero-stat:nth-child(1) { animation-delay: 1.1s; }
.hero-stat:nth-child(2) { animation-delay: 1.25s; }
.hero-stat:nth-child(3) { animation-delay: 1.40s; }

/* --- Polaroid photos fan-in --- */
@keyframes photoFanIn {
  from { opacity:0; transform: translateY(60px) scale(0.8); }
  to   { opacity:1; }
}
.hero-photo:nth-child(1) { animation: photoFanIn 0.55s 1.4s cubic-bezier(0.34,1.56,0.64,1) both; }
.hero-photo:nth-child(2) { animation: photoFanIn 0.55s 1.55s cubic-bezier(0.34,1.56,0.64,1) both; }
.hero-photo:nth-child(3) { animation: photoFanIn 0.55s 1.70s cubic-bezier(0.34,1.56,0.64,1) both; }
.hero-photo:nth-child(4) { animation: photoFanIn 0.55s 1.85s cubic-bezier(0.34,1.56,0.64,1) both; }

/* --- Floating confetti particles --- */
#popis-confetti {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9998;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -20px;
  border-radius: 3px;
  animation: confettiFall linear infinite;
  opacity: 0.85;
}
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 0.85; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* --- Navbar slide-down --- */
@keyframes navSlide {
  from { transform: translateY(-100%); opacity:0; }
  to   { transform: none; opacity:1; }
}
nav { animation: navSlide 0.5s 0.05s ease both; }

/* --- Achievement banner count-up glow --- */
.ach-stat .big { transition: color 0.3s; }
.ach-stat.glowing .big { text-shadow: 0 0 18px rgba(255,255,255,0.8); }

/* --- Scroll-progress bar --- */
#scroll-progress {
  position: fixed;
  top: 0; left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, var(--orange), var(--yellow), var(--green-dark));
  z-index: 10000;
  transition: width 0.1s linear;
  border-radius: 0 2px 2px 0;
}

/* --- Card hover lift (enhance existing) --- */
.card, .team-card, .promo-item, .highlight-card, .reflection-card {
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease !important;
  will-change: transform;
}

/* --- Section header underline wipe --- */
.section-divider {
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.6s 0.3s cubic-bezier(0.22,1,0.36,1);
}
.section-divider.visible { transform: scaleX(1); }

/* --- Floating emoji extra wiggle --- */
@keyframes floatYWiggle {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  25%      { transform: translateY(-14px) rotate(5deg); }
  50%      { transform: translateY(-8px) rotate(-3deg); }
  75%      { transform: translateY(-18px) rotate(4deg); }
}
.floating-deco:nth-child(odd)  { animation: floatYWiggle 4s ease-in-out infinite; }
.floating-deco:nth-child(even) { animation: floatYWiggle 5s 0.7s ease-in-out infinite; }

/* --- Scroll hint arrow bounce enhance --- */
@keyframes scrollBounce {
  0%,100% { transform: translateY(0); opacity:1; }
  50%      { transform: translateY(10px); opacity:0.6; }
}
.scroll-hint { animation: scrollBounce 1.2s ease-in-out infinite; }

/* --- Nav link active highlight --- */
.nav-links a.nav-active {
  background: var(--orange);
  color: white;
}
</style>

<!-- Scroll progress bar -->
<div id="scroll-progress"></div>

<!-- Confetti canvas placeholder -->
<div id="popis-confetti"></div>

<script>
(function() {
  /* ---- Scroll progress bar ---- */
  var bar = document.getElementById('scroll-progress');
  window.addEventListener('scroll', function() {
    var scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
    bar.style.width = Math.min(scrolled, 100) + '%';
  }, { passive: true });

  /* ---- Scroll-reveal with IntersectionObserver ---- */
  function addRevealClass(selector, cls) {
    document.querySelectorAll(selector).forEach(function(el) {
      el.classList.add('reveal');
      if (cls) el.classList.add(cls);
    });
  }
  // Reveal section headers
  addRevealClass('.section-header', '');
  // Reveal cards staggered
  document.querySelectorAll('.cards-grid, .team-grid, .promo-grid, .highlight-grid, .photo-grid').forEach(function(el) {
    el.classList.add('stagger-children');
  });
  // Reveal other elements
  addRevealClass('.achievement-banner', 'reveal-scale');
  addRevealClass('.finance-table-wrap', 'reveal-left');
  addRevealClass('.about-subsection', '');

  var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        // Also trigger section-divider within
        entry.target.querySelectorAll('.section-divider').forEach(function(d) { d.classList.add('visible'); });
      }
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('.reveal, .stagger-children').forEach(function(el) {
    revealObserver.observe(el);
  });

  // Section dividers
  document.querySelectorAll('.section-divider').forEach(function(d) {
    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) { d.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.5 });
    obs.observe(d);
  });

  /* ---- Animated counter ---- */
  function animateCounter(el, target, duration, prefix, suffix) {
    prefix = prefix || '';
    suffix = suffix || '';
    var start = 0;
    var startTime = null;
    var isFloat = (target % 1 !== 0);

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      var progress = Math.min((timestamp - startTime) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = eased * target;
      el.textContent = prefix + (isFloat ? current.toFixed(2) : Math.round(current)) + suffix;
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = prefix + (isFloat ? target.toFixed(2) : target) + suffix;
    }
    requestAnimationFrame(step);
  }

  // Tag counter elements
  document.querySelectorAll('.hero-stat .num, .ach-stat .big').forEach(function(el) {
    var text = el.textContent.trim();
    var prefix = '';
    var suffix = '';
    var num;

    // Extract prefix (RM, etc.)
    var rmMatch = text.match(/^(RM\s*)/i);
    if (rmMatch) { prefix = rmMatch[1]; text = text.slice(rmMatch[1].length); }

    // Extract suffix (%, +, etc.) 
    var numMatch = text.match(/^([\d,.]+)(.*)$/);
    if (numMatch) {
      num = parseFloat(numMatch[1].replace(/,/g, ''));
      suffix = numMatch[2];
    }
    if (!isNaN(num)) {
      el.dataset.counterTarget = num;
      el.dataset.counterPrefix = prefix;
      el.dataset.counterSuffix = suffix;
      el.dataset.counterDone = '0';
    }
  });

  var counterObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        if (el.dataset.counterDone === '0') {
          el.dataset.counterDone = '1';
          animateCounter(el, parseFloat(el.dataset.counterTarget), 1600,
            el.dataset.counterPrefix, el.dataset.counterSuffix);
          counterObserver.unobserve(el);
        }
      }
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('[data-counter-target]').forEach(function(el) {
    counterObserver.observe(el);
  });

  /* ---- Hero title letter pop ---- */
  var heroTitle = document.querySelector('.hero-title');
  if (heroTitle) {
    var html = heroTitle.innerHTML;
    // wrap each text character (preserving <span> tags)
    var result = '';
    var delay = 0;
    for (var i = 0; i < html.length; i++) {
      var ch = html[i];
      if (ch === '<') {
        // pass through tags
        var end = html.indexOf('>', i);
        result += html.slice(i, end + 1);
        i = end;
      } else if (ch === ' ') {
        result += ' ';
      } else {
        result += '<span class="hero-title-char" style="transition-delay:' + delay + 'ms">' + ch + '</span>';
        delay += 55;
      }
    }
    heroTitle.innerHTML = result;
    setTimeout(function() {
      heroTitle.querySelectorAll('.hero-title-char').forEach(function(c) { c.classList.add('popped'); });
    }, 300);
  }

  /* ---- Confetti burst on load ---- */
  var confettiContainer = document.getElementById('popis-confetti');
  var colors = ['#FFD166','#F4845F','#B5D99C','#E05C5C','#7BBF6A','#FFF3CC','#fff','#8B5E3C'];
  var shapes = ['🎉','⭐','💛','✨','🍃','🌟'];

  function spawnConfettiPiece() {
    var el = document.createElement('div');
    el.className = 'confetti-piece';
    var useEmoji = Math.random() > 0.55;
    if (useEmoji) {
      el.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      el.style.fontSize = (12 + Math.random() * 14) + 'px';
      el.style.background = 'none';
      el.style.width = 'auto';
      el.style.height = 'auto';
    } else {
      el.style.width  = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
    }
    el.style.left = (Math.random() * 100) + 'vw';
    var dur = (3 + Math.random() * 5).toFixed(2);
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = (Math.random() * 3).toFixed(2) + 's';
    confettiContainer.appendChild(el);
    setTimeout(function() { el.remove(); }, (parseFloat(dur) + 3.5) * 1000);
  }

  // Burst of confetti on page load
  for (var ci = 0; ci < 60; ci++) {
    setTimeout(spawnConfettiPiece, ci * 40);
  }
  // Occasional trickle
  var trickleInterval = setInterval(function() {
    if (Math.random() > 0.6) spawnConfettiPiece();
  }, 800);
  // Stop trickle after 18 s
  setTimeout(function() { clearInterval(trickleInterval); }, 18000);

  /* ---- Active nav link highlighting ---- */
  var sections = document.querySelectorAll('section[id], div[id="hero"]');
  var navLinks = document.querySelectorAll('.nav-links a');

  function updateActiveNav() {
    var scrollY = window.scrollY + 100;
    sections.forEach(function(sec) {
      if (scrollY >= sec.offsetTop && scrollY < sec.offsetTop + sec.offsetHeight) {
        navLinks.forEach(function(a) { a.classList.remove('nav-active'); });
        var match = document.querySelector('.nav-links a[href="#' + sec.id + '"]');
        if (match) match.classList.add('nav-active');
      }
    });
  }
  window.addEventListener('scroll', updateActiveNav, { passive: true });
  updateActiveNav();

  /* ---- Achievement stat glow on scroll ---- */
  document.querySelectorAll('.ach-stat').forEach(function(stat) {
    var obs = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        stat.classList.add('glowing');
        setTimeout(function() { stat.classList.remove('glowing'); }, 1200);
        obs.disconnect();
      }
    }, { threshold: 0.8 });
    obs.observe(stat);
  });

})();
</script>
</body>
</html>
