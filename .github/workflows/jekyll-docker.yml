    <div class="ps-grid">
      <div class="ps-box problem">
        <h4 style="color:#C0392B;">❗ Problems We Faced</h4>
        <ul>
          <li>Some of our bananas went bad before we could open our weekly booth, resulting in wasted stock and last-minute scrambling.</li>
          <li>We had no proper kitchen or cooking space of our own to prepare our popia.</li>
        </ul>
      </div>

      <div class="ps-box solution">
        <h4 style="color:var(--green-dark);">✅ Our Solutions</h4>
        <ul>
          <li>We adjusted our purchasing schedule to buy bananas only a day before or on the same day as our booth, keeping our ingredients fresh and reducing waste.</li>
          <li>We approached the Dean of our faculty to ask for permission, and were able to open and prepare our booth at FPPS.</li>
        </ul>
      </div>
    </div>

    <div class="section-header" style="margin-top:60px;">
      <h3 class="section-title" style="font-size:1.6rem;">Suggestions & <span class="accent">Recommendations</span></h3>
      <div class="section-divider"></div>
      <p style="margin-top:12px; color:var(--text-mid); font-size:0.9rem;">What we'd do better next time 🤔</p>
    </div>

    <div class="suggestions-list">
      <div class="suggestion-item">
        <div class="num">01</div>
        <p><strong>Assign one member as "order coordinator"</strong> during peak hours, dedicated solely to taking and handing out orders. When we were flooded with constant orders, it became hard to track which had already been served and which hadn't — having one point of contact for order flow would prevent mix-ups and missed orders.</p>
      </div>
      <div class="suggestion-item">
        <div class="num">02</div>
        <p><strong>Introduce a loyalty card</strong> where customers can collect stamps for every purchase, and after a certain number of stamps, they receive a free item. This would encourage repeat business and reward our loyal customers.</p>
      </div>
        <div class="suggestion-item">
        <div class="num">03</div>
        <p><strong>Buy perishable ingredients based on confirmed preorder numbers</strong> rather than estimates, so stock like bananas is purchased closer to the actual quantity needed. This builds on what we learned from our spoilage issue and would further minimize waste.</p>
      </div>    
    </div>
  </section>
