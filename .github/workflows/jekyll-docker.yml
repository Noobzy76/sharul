        <p>Popislicious is a food-based business run by Group 9, Section 5 APK from Universiti Malaysia Sabah (UMS). What started as a class assignment under the <strong>Entrepreneurial Acculturation</strong> subject grew into a real, hands-on small business experience — our team of 8 handled everything from recipe development and production to marketing, sales, and financial management. We're a group of students who believe a great snack doesn't need to be complicated, just made with care, sold with heart, and shared with a smile.</p>
        <br>
        <p>Our practicum runs on a simple <strong>take-order-and-deliver</strong> model: customers place their orders with us in advance, and we prepare everything fresh before delivering straight to them (alongside walk-in sales at our pop-up booth).</p>
